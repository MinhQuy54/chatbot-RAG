version : '3.8'

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api_service
    env_file:
      - .env
    ports: 
      - "8080:8080"
    depends_on:
      - mysql_db
      - qdrant_db
    volumes:
     - ./app:/app/app
     - ./pipeline:/app/pipeline
     - ./app:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    restart: unless-stopped
    networks:
      - veggie_net

  mysql_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: veggie_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - veggie_net
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333" # ports REST API
      - "6334:6334" # ports gRPC 
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - veggie_net

networks:
  veggie_net:
    driver: bridge

volumes:
  mysql_data:
  qdrant_storage: